<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddiqson's Limited - Premium Fabric Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 🎭 Cinematic Slow Slideshow */
        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out; /* Slow Theme Transition */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 🌊 Fabric Flick Ripple (Left to Right) */
            animation: fabricFlick 8s ease-in-out infinite;
        }

        .slide.active { opacity: 1; }

        @keyframes fabricFlick {
            0% { transform: scale(1.02) translateX(-10px); filter: brightness(1); }
            50% { transform: scale(1.08) translateX(15px); filter: brightness(1.1); }
            100% { transform: scale(1.02) translateX(-10px); filter: brightness(1); }
        }

        /* 📋 Crystal Container */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 40px 30px;
            border-radius: 40px;
            width: 500px;
            max-height: 90vh;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        h2 {
            font-family: 'Cinzel', serif; 
            font-size: 1.7rem;
            margin-bottom: 25px;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .search-box { display: flex; flex-direction: column; gap: 15px; }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            font-size: 1rem;
            outline: none;
            color: #fff;
            text-align: center;
        }

        input:focus { border-color: #ff4d4d; }

        button {
            background: #ffffff; 
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        button:hover { background: #ff4d4d; color: #fff; }

        /* 📋 All 11 Data Fields Styling */
        #result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            color: #fff;
            text-align: left;
            display: none;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .label { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; font-weight: 400; }
        .value { font-weight: 600; font-size: 0.85rem; color: #ffbcbc; text-align: right; }

        /* 🫧 Bubbles */
        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rise var(--t) linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes rise { 
            0% { transform: translateY(0); opacity: 0.5; } 
            100% { transform: translateY(-110vh); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide active" style="background-image: url('Cloth.png');"></div>
        <div class="slide" style="background-image: url('Cloth1.png');"></div>
        <div class="slide" style="background-image: url('Cloth2.png');"></div>
    </div>

    <div class="container">
        <h2>SIDDIQSON'S LIMITED</h2>
        <div class="search-box">
            <input type="text" id="productCode" placeholder="ENTER ARTICLE CODE">
            <button onclick="searchProduct()">Searching Article</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://ahesan12.app.n8n.cloud/webhook/a5d37079-f7e1-4c3e-8610-a16a95efc70c';

        // 🖼️ Cinematic Slow Transition (8 Seconds)
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 8000);

        // 🫧 Bubbles
        function createBubble() {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 20 + 5 + "px";
            bubble.style.width = size; bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + "vw";
            bubble.style.setProperty('--t', Math.random() * 5 + 10 + "s");
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 15000);
        }
        setInterval(createBubble, 1200);

        async function searchProduct() {
            const code = document.getElementById('productCode').value.trim();
            const resultDiv = document.getElementById('result');
            if (!code) return;

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = "<div style='text-align:center'>SEARCHING ARCHIVES...</div>";

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                const data = await response.json();
                
                // BACK TO ALL 11 FIELDS
                if (data.Article || data.Code) {
                    resultDiv.innerHTML = `
                        <div class="result-row"><span class="label">Costing Code:</span><span class="value">${data.Costing_Code || '-'}</span></div>
                        <div class="result-row"><span class="label">Article:</span><span class="value">${data.Article || '-'}</span></div>
                        <div class="result-row"><span class="label">Code:</span><span class="value">${data.Code || '-'}</span></div>
                        <div class="result-row"><span class="label">Quality:</span><span class="value">${data.Quality || '-'}</span></div>
                        <div class="result-row"><span class="label">Type:</span><span class="value">${data.Type || '-'}</span></div>
                        <div class="result-row"><span class="label">Weight:</span><span class="value">${data.Weight || '-'}</span></div>
                        <div class="result-row"><span class="label">Color:</span><span class="value">${data.Color || '-'}</span></div>
                        <div class="result-row"><span class="label">Finish Type:</span><span class="value">${data.Finish_Type || '-'}</span></div>
                        <div class="result-row"><span class="label">Weave:</span><span class="value">${data.Weave || '-'}</span></div>
                        <div class="result-row"><span class="label">Price (LC):</span><span class="value">${data.Price_LC || '-'}</span></div>
                        <div class="result-row"><span class="label">Price (FC):</span><span class="value">${data.Price_FC || '-'}</span></div>
                    `;
                } else {
                    resultDiv.innerHTML = "<div style='text-align:center'>NOT FOUND</div>";
                }
            } catch (e) { resultDiv.innerHTML = "ERROR"; }
        }
    </script>
</body>
</html>
